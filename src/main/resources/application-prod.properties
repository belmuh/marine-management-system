# ============================================
# PRODUCTION PROFILE
# ============================================

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Database Pool - Production tuning
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:10}

# Schema Management - VALIDATE ONLY
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.enabled=true  

# SQL Logging - OFF
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Logging - PRODUCTION
logging.level.root=WARN
logging.level.com.marine.management=INFO
logging.level.com.marine.management.shared.multitenant.TenantFilter=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.security=WARN

# Security
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
system.admin.password=${SYSTEM_ADMIN_PASSWORD}

# CORS - Strict
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Cloudflare R2 Storage
app.r2.account-id=${R2_ACCOUNT_ID}
app.r2.access-key=${R2_ACCESS_KEY}
app.r2.secret-key=${R2_SECRET_KEY}
app.r2.bucket=${R2_BUCKET:marine-attachments}
app.r2.presigned-url-expiry-minutes=${R2_PRESIGNED_URL_EXPIRY:60}

# Actuator - MINIMAL (only health + metrics)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=never

# Metrics - Production tags
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=production

# Server - No error details
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never