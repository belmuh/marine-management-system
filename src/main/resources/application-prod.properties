# ============================================
# PRODUCTION PROFILE
# ============================================

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Database Pool - Production tuning
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:10}

# Schema Management - VALIDATE ONLY
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# SQL Logging - OFF
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Logging - PRODUCTION
logging.level.root=WARN
logging.level.com.marine.management=INFO
logging.level.com.marine.management.shared.multitenant.TenantFilter=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.security=WARN

# Application
spring.application.name=marine-management-system

# Server
server.port=${SERVER_PORT:10000}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Security
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
refresh.token.expiration=${REFRESH_TOKEN_EXPIRATION:604800000}
system.admin.username=${SYSTEM_ADMIN_USERNAME:superadmin}
system.admin.email=${SYSTEM_ADMIN_EMAIL:superadmin@marine.com}
system.admin.password=${SYSTEM_ADMIN_PASSWORD}

# System Organization
system.organization.code=SYSTEM
system.organization.country=XX
system.organization.currency=EUR
system.organization.company-name=Marine Management System

# File Upload
app.upload.dir=${APP_STORAGE_PATH:uploads}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=24h
spring.cache.cache-names=exchange-rates

# Cookie
app.cookie.secure=${APP_COOKIE_SECURE:true}

# CORS - Strict
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Cloudflare R2 Storage
# R2 prod'da default AĂ‡IK. app.r2.enabled set edilmediÄźinde FileStorageService
# default false ile sessiz no-op moduna dĂĽĹźĂĽyordu: upload API'leri baĹźarÄ±lÄ±
# dĂ¶nĂĽyor ama hiĂ§bir dosya kaydedilmiyordu.
app.r2.enabled=${R2_ENABLED:true}
app.r2.account-id=${R2_ACCOUNT_ID}
app.r2.access-key=${R2_ACCESS_KEY}
app.r2.secret-key=${R2_SECRET_KEY}
app.r2.bucket=${R2_BUCKET:marine-attachments}
app.r2.presigned-url-expiry-minutes=${R2_PRESIGNED_URL_EXPIRY:60}

# Actuator - MINIMAL (only health + metrics)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=never

# Metrics - Production tags
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=production

# Error Tracking (Sentry)
# DSN deÄźerini Sentry projesinden al: Settings â†’ Projects â†’ Client Keys â†’ DSN
sentry.dsn=${SENTRY_DSN}
sentry.environment=production
sentry.traces-sample-rate=0.1
sentry.send-default-pii=false