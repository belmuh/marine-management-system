# ============================================
# TEST PROFILE (for integration tests)
# ============================================

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Schema
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Logging - Minimal
logging.level.root=WARN
logging.level.com.marine.management=DEBUG
spring.jpa.show-sql=false

# File Upload - Temp directory
app.upload.dir=${java.io.tmpdir}/marine-test-uploads

# JWT - Fast expiration
jwt.expiration=60000
jwt.secret=testSecretKey123456789012345678901234567890

# Actuator - Disabled in tests
management.endpoints.enabled-by-default=false

spring.flyway.enabled=false
