# Default profile
spring.profiles.default=dev

# ============================================
# APPLICATION
# ============================================
spring.application.name=marine-management-system
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ============================================
# DATABASE - PostgreSQL
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/marine_management}
spring.datasource.username=${DATABASE_USERNAME:marine_user}
spring.datasource.password=${DATABASE_PASSWORD}

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA/HIBERNATE - PRODUCTION MODE
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# SQL Initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Hibernate Properties
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# SQL logging OFF
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# ============================================
# HIBERNATE ENVERS (Audit History)
# ============================================
# Audit table naming: financial_entries → financial_entries_aud
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
# Store entity snapshot on delete (preserves last state)
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
# Revision type column name in audit tables
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype
# Don't auto-create audit tables — Flyway handles schema exclusively
spring.jpa.properties.hibernate.envers.autoRegisterConverters=true

# ============================================
# FLYWAY MIGRATION (Production)
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true

# ============================================
# LOGGING - MINIMAL DEFAULTS
# ============================================
logging.level.root=INFO
logging.level.com.marine.management=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.security=WARN

# ============================================
# ACTUATOR & METRICS - MINIMAL EXPOSURE
# ============================================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=never

# Metrics Export - Prometheus
management.metrics.export.prometheus.enabled=true

# Metrics Tags
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active:default}

# ============================================
# SYSTEM ADMIN BOOTSTRAP
# ============================================
system.admin.username=${SYSTEM_ADMIN_USERNAME:superadmin}
system.admin.email=${SYSTEM_ADMIN_EMAIL:superadmin@marine.com}
system.admin.password=${SYSTEM_ADMIN_PASSWORD}

system.organization.code=SYSTEM
system.organization.country=XX
system.organization.currency=EUR
system.organization.company-name=Marine Management System

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
refresh.token.expiration=${REFRESH_TOKEN_EXPIRATION:604800000}

# ============================================
# COOKIE CONFIGURATION
# ============================================
# Dev ortamında false (http://localhost), prod'da true (https://)
app.cookie.secure=${COOKIE_SECURE:true}

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ============================================
# EMAIL - Brevo SMTP
# ============================================
# MAIL_ENABLED=false -> NoOpEmailService (mail gonderilmez, log'lanir)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application email settings
app.mail.from=${MAIL_FROM:noreply@marine-management.com}
app.mail.verify-url=${APP_VERIFY_URL:http://localhost:4200/verify-email}
app.mail.reset-password-url=${APP_RESET_PASSWORD_URL:http://localhost:4200/reset-password}
app.mail.enabled=${MAIL_ENABLED:false}

# ============================================
# FILE UPLOAD
# ============================================
app.upload.dir=${APP_STORAGE_PATH:uploads}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# ============================================
# CACHE - Caffeine
# ============================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=24h
spring.cache.cache-names=exchange-rates

# ============================================
# SERVER
# ============================================
server.port=${PORT:${SERVER_PORT:8080}}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never