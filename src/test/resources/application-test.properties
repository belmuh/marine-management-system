# ============================================
# TEST PROFILE (for integration tests)
# ============================================

# Database: Testcontainers PostgreSQL (@ServiceConnection ile otomatik bağlanır,
# datasource konfigürasyonu gerekmez — bkz. TestcontainersConfiguration)
# H2 kaldırıldı: RLS ve PG-spesifik davranış H2'de test edilemez.

# Schema: Flyway migration'ları koşar, Hibernate yalnızca doğrular
spring.jpa.hibernate.ddl-auto=validate

# Logging - Minimal
logging.level.root=WARN
logging.level.com.marine.management=DEBUG
spring.jpa.show-sql=false

# File Upload - Temp directory
app.upload.dir=${java.io.tmpdir}/marine-test-uploads

# JWT - Fast expiration
jwt.expiration=60000
jwt.secret=testSecretKey123456789012345678901234567890
refresh.token.expiration=604800000

# CORS - test ortamında localhost yeterli
cors.allowed-origins=http://localhost:4200

# System admin bootstrap - test değerleri
# (SystemAdminInitializer @Profile("!test") olduğu için çalışmaz ama
# context load sırasında @Value injection için gereklidir)
system.admin.password=TestAdmin123!

# R2 - test ortamında devre dışı
app.r2.enabled=false

# Mail - app.mail.enabled=false (default) → SmtpEmailService yüklenmez,
# NoOpEmailService devreye girer. JavaMailSender bean'i oluşturulmaz.
app.mail.enabled=false

# Actuator - Disabled in tests
management.endpoints.enabled-by-default=false

spring.flyway.enabled=true
